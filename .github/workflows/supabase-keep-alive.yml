name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 12 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ileauttjsshfrihianpt.supabase.co/rest/v1/?apikey=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsZWF1dHRqc3NoZnJpaGlhbnB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4ODc4NzgsImV4cCI6MjA4ODQ2Mzg3OH0.xrvewF818EVTH3sye3SV-PktY1lIOT6pVbDIyZrOcCY")
          echo "Response status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "Supabase is alive!"
          else
            echo "Failed with status $STATUS"
            exit 1
          fi
